<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="jpnEccjOXP8kDhBZshHuxD-iDjGeJb6Epxzpfjvm54s" />
    
    <title>NovelStation - Urdu Novels</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Nastaliq Urdu', serif; background-color: #f4f7f6; margin: 0; padding: 0; color: #333; }
        header { background: #1e272e; color: #ffffff; padding: 40px 20px; text-align: center; border-bottom: 5px solid #05c46b; }
        h1 { margin: 0; font-size: 2.5rem; }
        .main-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .novel-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); text-align: center; border-top: 4px solid #05c46b; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card h3 { font-size: 1.4rem; color: #2c3e50; margin: 10px 0; min-height: 60px; }
        .author { color: #7f8c8d; font-size: 0.9rem; margin-bottom: 15px; display: block; }
        .tag { background: #ff4757; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; display: inline-block; margin-bottom: 5px; }
        .short-tag { background: #1e90ff; }
        .download-btn { background: #05c46b; color: white; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: bold; font-size: 0.9rem; display: block; }
    </style>
</head>
<body>

<header>
    <h1>NovelStation</h1>
    <p>Trending aur Short Urdu Novels ka Markaz</p>
</header>

<div class="main-container">
    <div class="novel-grid" id="grid">
        <script>
            const novels = [
                {n: "پیرِ کامل", a: "عمیرہ احمد", t: "All Time Hit"},
                {n: "آبِ حیات", a: "عمیرہ احمد", t: "Trending"},
                {n: "مالا", a: "نمرہ احمد", t: "New"},
                {n: "نمل", a: "نمرہ احمد", t: "Must Read"},
                {n: "جنت کے پتے", a: "نمرہ احمد", t: "Classic"},
                {n: "عشقِ لا", a: "عنبرین حسیب", t: "Trending"},
                {n: "حالم", a: "نمرہ احمد", t: "Blockbuster"},
                {n: "مصحف", a: "نمرہ احمد", t: "Popular"},
                {n: "امر بیل", a: "عمیرہ احمد", t: "Classic"},
                {n: "دربارِ دل", a: "عمیرہ احمد", t: "Classic"},
                {n: "یارِ من", a: "رابعہ خان", t: "Short Novel", s:true},
                {n: "کچھ تم کہو کچھ ہم کہیں", a: "شازیہ مصطفیٰ", t: "Short Novel", s:true},
                {n: "تم بن", a: "مریم عزیز", t: "Short Novel", s:true},
                {n: "حاصلِ زیست", a: "عمیرہ احمد", t: "Famous"},
                {n: "لا حاصل", a: "عمیرہ احمد", t: "Famous"},
                {n: "تیرے سنگ", a: "مناہیل جیم", t: "YouTube Trend", s:true},
                {n: "میرا عشق تو", a: "سدرہ سحر", t: "YouTube Trend", s:true},
                {n: "ہمراز", a: "فرحت اشتیاق", t: "Popular"},
                {n: "بن روئے آنسو", a: "فرحت اشتیاق", t: "Classic"},
                {n: "دیارِ دل", a: "فرحت اشتیاق", t: "Classic"},
                {n: "عشق کا عین", a: "علیم الحق حقی", t: "Classic"},
                {n: "میرا نصیب", a: "سمیرا فضل", t: "Famous"},
                {n: "کنیز", a: "خدیجہ مستور", t: "Old Gold"},
                {n: "راکھ", a: "مستنصر حسین تارڑ", t: "Masterpiece"},
                {n: "خدا اور محبت", a: "ہاشم ندیم", t: "All Time Hit"}
            ];

            const grid = document.getElementById('grid');
            novels.forEach(novel => {
                grid.innerHTML += `
                    <div class="card">
                        <span class="tag ${novel.s ? 'short-tag' : ''}">${novel.t}</span>
                        <h3>${novel.n}</h3>
                        <span class="author">Musannif: ${novel.a}</span>
                        <a href="https://www.google.com/search?q=${novel.n}+Novel+PDF+Read+Online" target="_blank" class="download-btn">Read Online</a>
                    </div>`;
            });
        </script>
    </div>
</div>

<footer style="text-align: center; padding: 40px; color: #95a5a6;">
    &copy; 2026 NovelStation - All Rights Reserved
</footer>

</body>
</html>
